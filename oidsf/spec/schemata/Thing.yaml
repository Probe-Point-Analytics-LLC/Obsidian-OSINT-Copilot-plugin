Thing:
  abstract: true
  matchable: false
  featured:
  - name
  - country
  required:
  - name
  caption:
  - name
  properties:
    name:
      label: Name
      type: name
      rdf: http://www.w3.org/2004/02/skos/core#prefLabel
    summary:
      label: Summary
      type: text
    description:
      label: Description
      type: text
    country:
      label: Country
      type: country
    alias:
      label: Other name
      type: name
      rdf: http://www.w3.org/2004/02/skos/core#altLabel
    previousName:
      label: Previous name
      type: name
    weakAlias:
      label: Weak alias
      type: name
      matchable: false
    sourceUrl:
      label: Source link
      type: url
      matchable: false
    publisher:
      label: Publishing source
      matchable: false
    publisherUrl:
      label: Publishing source URL
      type: url
      matchable: false
    alephUrl:
      label: Aleph URL
      type: url
      hidden: true
      matchable: false
    wikipediaUrl:
      label: Wikipedia Article
      type: url
    wikidataId:
      label: Wikidata ID
      type: identifier
      format: qid
      maxLength: 32
    keywords:
      label: Keywords
    topics:
      label: Topics
      type: topic
    address:
      label: Address
      type: address
    addressEntity:
      label: Address
      reverse:
        name: things
        label: Located there
      type: entity
      range: Address
    program:
      label: Program
      description: Regulatory program or sanctions list on which an entity is listed.
    programId:
      label: Program ID
      type: identifier
      maxLength: 64
      hidden: true
      matchable: false
    notes:
      label: Notes
      type: text
    proof:
      label: Source document
      reverse:
        name: proven
        label: Derived entities
      type: entity
      range: Document
    indexText:
      label: Index text
      hidden: true
      type: text
    createdAt:
      label: Created at
      type: date
      matchable: false
    modifiedAt:
      label: Modified on
      type: date
      matchable: false
    retrievedAt:
      label: Retrieved on
      type: date
      matchable: false
