OnlineAccount:
  extends:
  - Thing
  label: Online account
  plural: Online accounts
  matchable: true
  generated: true
  featured:
  - username
  - service
  - email
  - owner
  required:
  - username
  caption:
  - username
  - email
  - service
  description: Service or platform account (OSINT). Unifies former FtM UserAccount
    and STIX 2.1 user-account (SCO) fields.
  properties:
    owner:
      label: Owner
      type: entity
      range: LegalEntity
      reverse:
        name: userAccounts
        label: User accounts
    service:
      label: Service
      type: string
    email:
      label: E-Mail
      type: email
    number:
      label: Phone Number
      type: phone
    username:
      label: Username
      type: string
    password:
      label: Password
      type: string
    ipAddress:
      label: IP address
      type: ip
    user_id:
      label: User id
      type: string
    credential:
      label: Credential
      type: string
    account_login:
      label: Account login
      type: string
    account_type:
      label: Account type
      type: string
    display_name:
      label: Display name
      type: string
    is_service_account:
      label: Is service account
      type: string
    is_privileged:
      label: Is privileged
      type: string
    can_escalate_privs:
      label: Can escalate privs
      type: string
    is_disabled:
      label: Is disabled
      type: string
    created:
      label: Created
      type: date
    expires:
      label: Expires
      type: date
    account_first_login:
      label: Account first login
      type: date
    account_last_login:
      label: Account last login
      type: date
    account_profile:
      label: Account profile
      description: social_handle | service_credential | stix_sco
      type: string
