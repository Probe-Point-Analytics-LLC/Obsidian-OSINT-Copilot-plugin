Infrastructure:
  label: "Infrastructure"
  extends:
    - StixObject
  description: >
    STIX 2.1 SDO/SRO `infrastructure` (OASIS CTI).
  stix_type: infrastructure
  matchable: false
  properties:
    name:
      label: Name
      type: name
    description:
      label: Description
      type: text
    infrastructure_types:
      label: Infrastructure types
      type: string
    aliases:
      label: Aliases
      type: string
    kill_chain_phases:
      label: Kill chain phases (JSON)
      type: text
